services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: smartgrid_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=smartgrid
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: smartgrid_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=timescaledb
      - DATABASE_ASYNC_URL=postgresql+asyncpg://postgres:postgres@timescaledb:5432/smartgrid
      - DATABASE_SYNC_URL=postgresql://postgres:postgres@timescaledb:5432/smartgrid
    depends_on:
      timescaledb:
        condition: service_healthy

volumes:
  timescaledb_data:
